{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="luxury-card rounded-2xl p-8 shimmer-border">
            <div class="text-center mb-8">
                <div
                    class="w-16 h-16 bg-gradient-to-br from-[#ffb700] to-[#805c00] rounded-2xl flex items-center justify-center mx-auto mb-4 pulse-glow">
                    <i class="fas fa-sign-in-alt text-2xl text-[#0a0a0a]"></i>
                </div>
                <h1 class="text-2xl font-bold font-display gold-gradient-text">Welcome Back</h1>
                <p class="text-gray-500 mt-1 text-sm">Sign in to your account</p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div
                class="mb-4 p-3 rounded-xl text-sm {% if message.tags == 'error' %}bg-red-950/50 text-red-400 border border-red-500/30{% else %}bg-blue-950/50 text-blue-400 border border-blue-500/30{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Username</label>
                    <input type="text" name="username" required autofocus class="w-full px-4 py-3 rounded-lg"
                        placeholder="Enter your username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 rounded-lg"
                        placeholder="Enter your password">
                </div>
                <button type="submit" class="glow-btn w-full py-3.5 rounded-xl text-base">
                    <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                Don't have an account?
                <a href="{% url 'register' %}"
                    class="text-[#ffb700] font-semibold hover:text-[#ffd700] transition">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
